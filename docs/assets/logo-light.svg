<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="botGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA" />
      <stop offset="100%" style="stop-color:#7C3AED" />
    </linearGradient>
    <linearGradient id="botGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD" />
      <stop offset="100%" style="stop-color:#8B5CF6" />
    </linearGradient>
    <linearGradient id="botGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E7FF" />
      <stop offset="100%" style="stop-color:#A5B4FC" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6366F1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Shield / Badge shape -->
  <path d="M70 8 L122 25 L122 68 C122 95 100 115 70 128 C40 115 18 95 18 68 L18 25 Z"
        fill="url(#shieldGrad)" filter="url(#shadow)" opacity="0.15" />
  <path d="M70 14 L116 29 L116 66 C116 90 96 108 70 120 C44 108 24 90 24 66 L24 29 Z"
        fill="url(#shieldGrad)" opacity="0.08" />

  <!-- Central bot (Squad Lead) - larger, more detailed -->
  <g transform="translate(70, 62)" filter="url(#shadow)">
    <!-- Body -->
    <rect x="-18" y="-8" width="36" height="28" rx="6" fill="url(#bgGrad)" />
    <!-- Head -->
    <rect x="-14" y="-28" width="28" height="22" rx="5" fill="url(#bgGrad)" />
    <!-- Antenna -->
    <line x1="0" y1="-28" x2="0" y2="-35" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="-37" r="3.5" fill="#C4B5FD">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Eyes -->
    <circle cx="-5" cy="-19" r="3" fill="#E0E7FF">
      <animate attributeName="r" values="3;3.5;3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="5" cy="-19" r="3" fill="#E0E7FF">
      <animate attributeName="r" values="3;3.5;3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-5" cy="-19" r="1.5" fill="#312E81"/>
    <circle cx="5" cy="-19" r="1.5" fill="#312E81"/>
    <!-- Mouth (smile) -->
    <path d="M-5,-11 Q0,-7 5,-11" stroke="#E0E7FF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Chest badge (star) -->
    <polygon points="0,-2 2,3 7,3 3,6 4.5,11 0,8 -4.5,11 -3,6 -7,3 -2,3" fill="#FCD34D" opacity="0.9" transform="scale(0.6)"/>
    <!-- Arms -->
    <rect x="-24" y="-4" width="6" height="18" rx="3" fill="url(#bgGrad)" transform="rotate(-15, -21, 5)"/>
    <rect x="18" y="-4" width="6" height="18" rx="3" fill="url(#bgGrad)" transform="rotate(15, 21, 5)"/>
  </g>

  <!-- Agent bot top-left -->
  <g transform="translate(26, 30)">
    <rect x="-9" y="-4" width="18" height="14" rx="3" fill="url(#botGrad1)" />
    <rect x="-7" y="-14" width="14" height="11" rx="3" fill="url(#botGrad1)" />
    <line x1="0" y1="-14" x2="0" y2="-18" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="-19.5" r="2" fill="#DDD6FE">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="-3" cy="-9.5" r="1.8" fill="#EDE9FE"/>
    <circle cx="3" cy="-9.5" r="1.8" fill="#EDE9FE"/>
    <circle cx="-3" cy="-9.5" r="0.9" fill="#4C1D95"/>
    <circle cx="3" cy="-9.5" r="0.9" fill="#4C1D95"/>
    <text x="0" y="18" text-anchor="middle" fill="#6366F1" font-size="6" font-family="Arial" font-weight="bold">PO</text>
  </g>

  <!-- Agent bot top-right -->
  <g transform="translate(114, 30)">
    <rect x="-9" y="-4" width="18" height="14" rx="3" fill="url(#botGrad2)" />
    <rect x="-7" y="-14" width="14" height="11" rx="3" fill="url(#botGrad2)" />
    <line x1="0" y1="-14" x2="0" y2="-18" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="-19.5" r="2" fill="#DDD6FE">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="-3" cy="-9.5" r="1.8" fill="#EDE9FE"/>
    <circle cx="3" cy="-9.5" r="1.8" fill="#EDE9FE"/>
    <circle cx="-3" cy="-9.5" r="0.9" fill="#4C1D95"/>
    <circle cx="3" cy="-9.5" r="0.9" fill="#4C1D95"/>
    <text x="0" y="18" text-anchor="middle" fill="#8B5CF6" font-size="6" font-family="Arial" font-weight="bold">DEV</text>
  </g>

  <!-- Agent bot bottom-left -->
  <g transform="translate(26, 100)">
    <rect x="-9" y="-4" width="18" height="14" rx="3" fill="url(#botGrad3)" />
    <rect x="-7" y="-14" width="14" height="11" rx="3" fill="url(#botGrad3)" />
    <line x1="0" y1="-14" x2="0" y2="-18" stroke="#A5B4FC" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="-19.5" r="2" fill="#C7D2FE">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="-3" cy="-9.5" r="1.8" fill="#EDE9FE"/>
    <circle cx="3" cy="-9.5" r="1.8" fill="#EDE9FE"/>
    <circle cx="-3" cy="-9.5" r="0.9" fill="#4338CA"/>
    <circle cx="3" cy="-9.5" r="0.9" fill="#4338CA"/>
    <text x="0" y="18" text-anchor="middle" fill="#6366F1" font-size="6" font-family="Arial" font-weight="bold">QA</text>
  </g>

  <!-- Agent bot bottom-right -->
  <g transform="translate(114, 100)">
    <rect x="-9" y="-4" width="18" height="14" rx="3" fill="url(#botGrad1)" />
    <rect x="-7" y="-14" width="14" height="11" rx="3" fill="url(#botGrad1)" />
    <line x1="0" y1="-14" x2="0" y2="-18" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="-19.5" r="2" fill="#DDD6FE">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" begin="1.1s"/>
    </circle>
    <circle cx="-3" cy="-9.5" r="1.8" fill="#EDE9FE"/>
    <circle cx="3" cy="-9.5" r="1.8" fill="#EDE9FE"/>
    <circle cx="-3" cy="-9.5" r="0.9" fill="#4C1D95"/>
    <circle cx="3" cy="-9.5" r="0.9" fill="#4C1D95"/>
    <text x="0" y="18" text-anchor="middle" fill="#7C3AED" font-size="6" font-family="Arial" font-weight="bold">SRE</text>
  </g>

  <!-- Connection lines with animated dashes -->
  <line x1="38" y1="35" x2="52" y2="45" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="0;6" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="102" y1="35" x2="88" y2="45" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="0;6" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="38" y1="95" x2="52" y2="82" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="0;6" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="102" y1="95" x2="88" y2="82" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="0;6" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- Floating data particles -->
  <circle cx="48" cy="40" r="1.5" fill="#C4B5FD" opacity="0.7">
    <animate attributeName="cx" values="48;55;48" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="40;43;40" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="92" cy="40" r="1.5" fill="#C4B5FD" opacity="0.7">
    <animate attributeName="cx" values="92;85;92" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="40;43;40" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="88" r="1.5" fill="#C4B5FD" opacity="0.7">
    <animate attributeName="cx" values="48;55;48" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cy" values="88;82;88" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="92" cy="88" r="1.5" fill="#C4B5FD" opacity="0.7">
    <animate attributeName="cx" values="92;85;92" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cy" values="88;82;88" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- Text: AI Squad -->
  <text x="160" y="58" fill="#1E1B4B" font-size="44" font-weight="800" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" letter-spacing="-1.5">
    AI Squad
  </text>

  <!-- Tagline -->
  <text x="162" y="82" fill="#6366F1" font-size="13.5" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif" letter-spacing="0.3" font-weight="500">
    Multi-Agent Orchestration Platform
  </text>

  <!-- Decorative code brackets -->
  <text x="162" y="108" fill="#A78BFA" font-size="11" font-family="'SF Mono', 'Fira Code', monospace" opacity="0.6" letter-spacing="0.5">
    { pipeline → agents → quality gates }
  </text>
</svg>
