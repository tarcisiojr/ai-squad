# Catálogo de agentes da plataforma
agents:
  - name: po
    domain: product
    protocol: text
    tools: []
    version: "1.0"
    adapter: claude-code
    path: agents/po
    priority: 1

  - name: dev-orchestrator
    domain: development
    protocol: text
    tools: []
    version: "1.0"
    adapter: claude-code
    path: agents/dev-orchestrator
    priority: 1

  - name: qa
    domain: quality
    protocol: text
    tools: []
    version: "1.0"
    adapter: claude-code
    path: agents/qa
    priority: 1

  - name: dev-web
    domain: web
    protocol: text
    tools:
      - html
      - css
      - javascript
      - typescript
      - react
    version: "1.0"
    adapter: claude-code
    path: agents/dev-web
    priority: 2
