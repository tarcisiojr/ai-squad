name: CI/CD — Test, Publish PyPI & Docker

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff pyright

      - name: Lint (ruff check)
        run: ruff check ai_squad/

      - name: Type check (pyright)
        run: pyright ai_squad/

      - name: Tests (pytest + coverage)
        run: pytest --cov=ai_squad --cov-report=term-missing --cov-fail-under=68

      - name: Validate Docker build
        run: docker build -f ai_squad/docker/Dockerfile -t ai-squad:test .

  publish-pypi:
    name: Publish to PyPI
    needs: [test]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ai-squad
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Auto-version on push to main
        if: github.event_name == 'push'
        run: |
          # Pega a última tag de versão ou usa 0.0.0
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          BASE_VERSION="${LAST_TAG#v}"

          # Conta commits desde a última tag
          COMMITS=$(git rev-list "${LAST_TAG}..HEAD" --count 2>/dev/null || echo "1")

          # Gera versão dev: X.Y.Z.devN
          DEV_VERSION="${BASE_VERSION}.dev${COMMITS}"

          echo "Version: ${DEV_VERSION}"
          sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" pyproject.toml

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docker:
    name: Publish Docker Image (GHCR)
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            echo "tags=ghcr.io/${{ github.repository }}:${VERSION},ghcr.io/${{ github.repository }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/${{ github.repository }}:dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ai_squad/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
