# Configuração centralizada da plataforma
ai_provider: claude-agent-sdk
messaging_provider: cli

# Modelo de IA (opcional, usa padrão do SDK se ausente)
ai_model: claude-sonnet-4-20250514

# Timeout padrão para execução de agentes (segundos)
agent_timeout: 300

# Diretório para persistência de estado
state_dir: state/

# Heartbeat — verificação periódica de demandas paradas
heartbeat:
  enabled: true
  interval: 300          # Segundos entre verificações (5min)
  stall_timeout: 1800    # Segundos para considerar parada (30min)
  reminder_timeout: 3600 # Segundos para lembrete de aprovação (1h)
  max_auto_retries: 3    # Máximo de retomadas automáticas

# Configurações por persona
personas:
  po:
    name: "PO Agent"
    avatar: "📋"
  dev-orchestrator:
    name: "Dev Orchestrator"
    avatar: "🔧"
  qa:
    name: "QA Agent"
    avatar: "🧪"
