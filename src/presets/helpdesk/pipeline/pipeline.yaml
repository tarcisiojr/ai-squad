name: "Helpdesk"
description: >
  Pipeline de atendimento interno com knowledge base.
  Atendente busca solução na KB, responde ao usuário e registra novas soluções.
  Escalação para humano quando não consegue resolver.

pipeline:
  steps:
    - id: atendimento
      name: "Atendimento"
      agent: atendente
      type: agent
      execution: subagent
      model_tier: powerful
      file: steps/step-01-atendimento.md

    - id: escalacao
      name: "Escalação"
      agent: atendente
      type: checkpoint
      execution: subagent
      model_tier: fast
      file: steps/step-02-escalacao.md

    - id: registro
      name: "Registro de Solução"
      agent: atendente
      type: agent
      execution: inline
      model_tier: fast
      file: steps/step-03-registro.md
